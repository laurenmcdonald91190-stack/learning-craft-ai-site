<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>

<script>
  // ── NAVIGATION ──
  const VALID_PAGES = ['home', 'about', 'services', 'courses', 'demo', 'contact'];

  function navigate(page) {
    if (!VALID_PAGES.includes(page)) page = 'home';

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');

    document.querySelectorAll('.nav-links a[data-page]').forEach(a => {
      a.classList.toggle('active', a.dataset.page === page);
    });

    history.pushState(null, '', page === 'home' ? '#' : '#' + page);
    window.scrollTo({ top: 0, behavior: 'auto' });

    initFadeIns();
  }

  function loadFromHash() {
    const hash = window.location.hash.replace('#', '').trim();
    const page = VALID_PAGES.includes(hash) ? hash : 'home';

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');

    document.querySelectorAll('.nav-links a[data-page]').forEach(a => {
      a.classList.toggle('active', a.dataset.page === page);
    });

    initFadeIns();
  }

  window.addEventListener('hashchange', loadFromHash);

  // ── EVENT DELEGATION ──
  document.addEventListener('click', function(e) {
    const el = e.target.closest('[data-nav]');
    if (!el) return;

    e.preventDefault();
    const page = el.getAttribute('data-nav');
    navigate(page);

    if (el.hasAttribute('data-close-menu')) {
      document.getElementById('mobile-menu').classList.remove('open');
    }
  });

  // Hamburger menu
  document.addEventListener('click', function(e) {
    const btn = e.target.closest('#hamburger-btn');
    if (!btn) return;

    document.getElementById('mobile-menu').classList.toggle('open');
  });

  // ── FADE-IN ANIMATIONS ──
  function initFadeIns() {
    const els = document.querySelectorAll('.page.active .fade-in');

    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });

    els.forEach(el => obs.observe(el));
  }

  window.addEventListener('load', loadFromHash);

  // ── CONTACT FORM ──
  document.addEventListener('click', function(e) {
    if (e.target.closest('#submit-btn-el')) handleSubmit();
  });

  async function handleSubmit() {
    const name = document.getElementById('f-name').value.trim();
    const email = document.getElementById('f-email').value.trim();
    const interest = document.getElementById('f-interest').value;
    const message = document.getElementById('f-message').value.trim();

    if (!name || !email) {
      document.getElementById('f-name').style.borderColor = name ? '' : 'rgba(155,93,229,0.5)';
      document.getElementById('f-email').style.borderColor = email ? '' : 'rgba(155,93,229,0.5)';
      return;
    }

    const btn = document.getElementById('submit-btn-el');
    btn.textContent = 'Sending…';
    btn.disabled = true;

    try {
      const res = await fetch('https://formspree.io/f/xojkegkk', {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email, interest, message })
      });

      if (res.ok) {
        document.getElementById('form-success').classList.add('show');
        document.getElementById('f-name').value = '';
        document.getElementById('f-email').value = '';
        document.getElementById('f-interest').selectedIndex = 0;
        document.getElementById('f-message').value = '';
      }

    } catch (err) {
      console.error(err);
    }

    btn.textContent = 'Send Message →';
    btn.disabled = false;
  }
</script>
